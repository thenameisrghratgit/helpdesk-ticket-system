<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – SSN Helpdesk</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #0a2a66;
      --blue: #1f4db8;
      --accent: #00b4ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #08163a, #1a3a8a);
      min-height: 100vh;
    }

    .top-bar {
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 40px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, .15);
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--navy);
      font-size: 20px;
    }

    .brand span {
      color: var(--accent);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .home-btn {
      padding: 9px 20px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }

    .home-btn:hover {
      background: var(--blue);
    }

    .logout-btn {
      padding: 9px 20px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }

    .page-title {
      color: white;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      padding: 40px 20px 24px;
    }

    .page-title small {
      display: block;
      font-size: 14px;
      opacity: .6;
      font-family: 'DM Sans', sans-serif;
      margin-top: 6px;
    }

    main {
      max-width: 1150px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* STATS */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat {
      flex: 1;
      min-width: 160px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .15);
      color: white;
      padding: 22px 24px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-n {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
    }

    .stat-l {
      font-size: 13px;
      opacity: .7;
      margin-top: 4px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .2);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: 2px solid #eef0f8;
    }

    .card-top h2 {
      color: var(--navy);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
    }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex;
      gap: 8px;
    }

    .view-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1.5px solid #dde2ef;
      background: white;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: #555;
      transition: .2s;
    }

    .view-btn.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    /* FILTER ROWS */
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 13px;
      color: #888;
      font-weight: 600;
      white-space: nowrap;
    }

    .filter-btn {
      padding: 6px 15px;
      border-radius: 20px;
      border: 1.5px solid #dde2ef;
      background: white;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: #555;
      transition: .2s;
    }

    .filter-btn:hover:not(.active) {
      background: #f0f4ff;
    }

    .filter-btn.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    /* SERVICE GROUP */
    .service-group {
      margin-bottom: 28px;
    }

    .service-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eef0f8;
    }

    .svc-num-badge {
      background: var(--navy);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .svc-name-lbl {
      color: var(--navy);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .svc-count-pill {
      margin-left: auto;
      background: #f0f4ff;
      color: var(--navy);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: #f0f4ff;
      color: var(--navy);
      padding: 11px 14px;
      text-align: left;
      font-weight: 700;
      border-bottom: 2px solid #dde2ef;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid #eef0f8;
      color: #444;
      vertical-align: middle;
    }

    tr:hover td {
      background: #fafbff;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
    }

    .Open {
      background: #fff3cd;
      color: #856404;
    }

    .In_Progress {
      background: #cfe2ff;
      color: #084298;
    }

    .Resolved {
      background: #d1e7dd;
      color: #0a3622;
    }

    .Closed {
      background: #e2e3e5;
      color: #41464b;
    }

    .q-chip {
      display: inline-block;
      background: #eef0f8;
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 3px;
    }

    select.status-sel {
      padding: 6px 10px;
      border: 1.5px solid #dde2ef;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      background: #fafbff;
    }

    .update-btn {
      padding: 6px 14px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      margin-left: 6px;
      transition: .2s;
    }

    .update-btn:hover {
      background: var(--blue);
    }

    .delete-btn {
      padding: 6px 12px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      margin-left: 4px;
    }

    .delete-btn:hover {
      opacity: .85;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #2ecc71;
      color: white;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .2);
      display: none;
      z-index: 999;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="brand">SSN <span>Helpdesk</span> <span
        style="font-size:13px;color:#e74c3c;font-family:'DM Sans';font-weight:700;">ADMIN</span></div>
    <div class="top-actions">
      <button class="home-btn" onclick="location.href='/'">← Home</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="page-title">
    Admin Panel
    <small>Manage all support tickets</small>
  </div>

  <main>
    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="sTotal">–</div>
        <div class="stat-l">Total Tickets</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="sOpen" style="color:#ffc107">–</div>
        <div class="stat-l">Open</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="sProgress" style="color:#00b4ff">–</div>
        <div class="stat-l">In Progress</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="sResolved" style="color:#2ecc71">–</div>
        <div class="stat-l">Resolved / Closed</div>
      </div>
    </div>

    <div class="card">
      <div class="card-top">
        <h2>🎫 All Support Tickets</h2>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-grouped" onclick="setView('grouped')">By Service</button>
          <button class="view-btn" id="btn-all" onclick="setView('all')">All Tickets</button>
        </div>
      </div>

      <!-- STATUS FILTER -->
      <div class="filter-row">
        <span class="filter-label">Status:</span>
        <button class="filter-btn active" onclick="setStatusFilter('All',this)">All</button>
        <button class="filter-btn" onclick="setStatusFilter('Open',this)">Open</button>
        <button class="filter-btn" onclick="setStatusFilter('In Progress',this)">In Progress</button>
        <button class="filter-btn" onclick="setStatusFilter('Resolved',this)">Resolved</button>
        <button class="filter-btn" onclick="setStatusFilter('Closed',this)">Closed</button>
      </div>

      <!-- SERVICE FILTER (grouped view only) -->
      <div class="filter-row" id="svc-filter-row">
        <span class="filter-label">Service:</span>
        <button class="filter-btn active" onclick="setServiceFilter(0,this)">All</button>
      </div>

      <div id="tableWrap"></div>
    </div>
  </main>

  <div class="toast" id="toast">✅ Status updated!</div>

  <script>
    let allGroups = [];
    let allTickets = [];
    let serviceMap = {};
    let currentView = 'grouped';
    let statusFilter = 'All';
    let serviceFilter = 0;

    async function load() {
      const sessionRes = await fetch('/api/session');
      const session = await sessionRes.json();
      if (!session.loggedIn || session.role !== 'admin') {
        document.getElementById('tableWrap').innerHTML =
          '<div class="empty">Access denied. <a href="/login">Login as admin.</a></div>';
        return;
      }

      const [grpRes, svcRes] = await Promise.all([
        fetch('/api/ticket/grouped'),
        fetch('/api/services')
      ]);
      const grpData = await grpRes.json();
      const svcData = await svcRes.json();

      allGroups = grpData.groups || [];
      serviceMap = svcData.services || {};
      allTickets = allGroups.flatMap(g => g.tickets);

      buildServiceFilter();
      renderStats();
      render();
    }

    function renderStats() {
      document.getElementById('sTotal').textContent = allTickets.length;
      document.getElementById('sOpen').textContent = allTickets.filter(t => t.status === 'Open').length;
      document.getElementById('sProgress').textContent = allTickets.filter(t => t.status === 'In Progress' || t.status === 'In_Progress').length;
      document.getElementById('sResolved').textContent = allTickets.filter(t => t.status === 'Resolved' || t.status === 'Closed').length;
    }

    function buildServiceFilter() {
      const row = document.getElementById('svc-filter-row');
      [...row.querySelectorAll('.svc-dyn')].forEach(b => b.remove());
      allGroups.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn svc-dyn';
        btn.textContent = serviceMap[g.serviceNum] || `Service ${g.serviceNum}`;
        btn.onclick = () => setServiceFilter(g.serviceNum, btn);
        row.appendChild(btn);
      });
    }

    function setStatusFilter(s, btn) {
      statusFilter = s;
      document.querySelectorAll('#svc-filter-row ~ .filter-row .filter-btn, .filter-row:first-of-type .filter-btn').forEach(b => b.classList.remove('active'));
      // simpler: reset all status filter btns
      btn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setServiceFilter(num, btn) {
      serviceFilter = num;
      document.getElementById('svc-filter-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setView(v) {
      currentView = v;
      document.getElementById('btn-grouped').classList.toggle('active', v === 'grouped');
      document.getElementById('btn-all').classList.toggle('active', v === 'all');
      document.getElementById('svc-filter-row').style.display = v === 'grouped' ? 'flex' : 'none';
      render();
    }

    function applyStatus(tickets) {
      if (statusFilter === 'All') return tickets;
      return tickets.filter(t => t.status === statusFilter || t.status === statusFilter.replace(' ', '_'));
    }

    function render() {
      const wrap = document.getElementById('tableWrap');

      if (currentView === 'all') {
        const filtered = applyStatus(allTickets);
        wrap.innerHTML = filtered.length === 0
          ? '<div class="empty">No tickets in this category.</div>'
          : buildTable(filtered, true);
        return;
      }

      // grouped
      let groups = allGroups;
      if (serviceFilter !== 0) groups = groups.filter(g => g.serviceNum === serviceFilter);

      let html = '';
      groups.forEach(g => {
        const tickets = applyStatus(g.tickets);
        if (!tickets.length) return;
        html += `<div class="service-group">
      <div class="service-group-header">
        <span class="svc-num-badge">${g.serviceNum}</span>
        <span class="svc-name-lbl">${g.serviceName}</span>
        <span class="svc-count-pill">${tickets.length} ticket${tickets.length !== 1 ? 's' : ''}</span>
      </div>
      ${buildTable(tickets, false)}
    </div>`;
      });
      wrap.innerHTML = html || '<div class="empty">No tickets found.</div>';
    }

    function buildTable(tickets, showService) {
      const svcHead = showService ? '<th>Service</th>' : '';
      const rows = tickets.map((t, i) => {
        const sc = (t.status || '').replace(' ', '_');
        const svcCell = showService ? `<td>${t.service}</td>` : '';
        const queueChip = t.status === 'Open'
          ? `<br><span class="q-chip">#${i + 1} in queue</span>` : '';
        return `<tr>
      <td><strong>${t.id}</strong>${queueChip}<br>
        <span style="font-size:12px;color:#888">${t.username}</span></td>
      <td>${t.requesterName}</td>
      ${svcCell}
      <td style="max-width:200px">${t.description}</td>
      <td><span class="badge ${sc}">${t.status}</span></td>
      <td>${t.date || 'Today'}</td>
      <td style="white-space:nowrap">
        <select class="status-sel" id="sel_${t.id}">
          <option value="Open"        ${t.status === 'Open' ? 'selected' : ''}>Open</option>
          <option value="In_Progress" ${t.status === 'In_Progress' || t.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
          <option value="Resolved"    ${t.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
          <option value="Closed"      ${t.status === 'Closed' ? 'selected' : ''}>Closed</option>
        </select>
        <button class="update-btn" onclick="updateStatus('${t.id}')">Update</button>
        <button class="delete-btn" onclick="deleteTicket('${t.id}')">Delete</button>
      </td>
    </tr>`;
      }).join('');

      return `<table>
    <thead><tr>
      <th>Ticket ID</th><th>Requester</th>${svcHead}
      <th>Description</th><th>Status</th><th>Date</th><th>Action</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
    }

    async function updateStatus(id) {
      const status = document.getElementById('sel_' + id).value;
      const res = await fetch('/api/ticket/update', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticketId: String(id), status })
      });
      const data = await res.json();
      if (data.ok) { showToast(); await load(); }
    }

    async function deleteTicket(id) {
      if (!confirm(`Delete ticket ${id}?`)) return;
      await fetch('/api/ticket/delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticketId: id })
      });
      await load();
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/';
    }

    load();
  </script>
</body>

</html>
