<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>HTMS Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

/* PAGE BACKGROUND */

body{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background:linear-gradient(135deg,#0a2a66,#3b82f6);
}

/* WHITE HEADER BAR */

.header{
width:100%;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* SSN LOGO */

.header img{
height:55px;
}

/* HOME BUTTON */

.home-btn{
padding:10px 20px;
border:none;
border-radius:6px;
background:linear-gradient(45deg,#08214f,#0072ff);
color:white;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

.home-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* LOGIN CARD */

.container{
margin-top:80px;
width:380px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:40px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
color:white;
}

/* TITLE */

.title{
text-align:center;
font-size:28px;
margin-bottom:25px;
font-weight:bold;
}

/* TABS */

.tabs{
display:flex;
margin-bottom:25px;
}

.tabs button{
flex:1;
padding:10px;
border:none;
background:transparent;
color:white;
font-size:16px;
cursor:pointer;
border-bottom:2px solid transparent;
transition:0.3s;
}

.tabs button.active{
border-bottom:2px solid white;
}

/* INPUT */

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
outline:none;
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#eee;
}

input:focus{
box-shadow:0 0 10px #4ade80;
}

/* PASSWORD EYE */

.password-box{
position:relative;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

/* BUTTON */

.btn{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
background:linear-gradient(45deg,#08214f,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* FORM VISIBILITY */

.form{
display:none;
}

.form.active{
display:block;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#ddd;
}

</style>
</head>


<body>

<!-- HEADER -->

<div class="header">

<img src="Z:\SDP\assests\ssn.png" alt="SSN Logo">

<button class="home-btn" onclick="goHome()">Back to Home</button>

</div>


<!-- LOGIN CARD -->

<div class="container">

<div class="title">SSN HTMS Portal</div>

<div class="tabs">

<button id="loginTab" class="active" onclick="showLogin()">Login</button>

<button id="registerTab" onclick="showRegister()">Register</button>

</div>


<!-- LOGIN FORM -->

<form id="login" class="form active">

<div class="input-group">
<input type="text" placeholder="Username">
</div>

<div class="input-group password-box">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button class="btn">Login</button>

</form>


<!-- REGISTER FORM -->

<form id="register" class="form">

<div class="input-group">
<input type="text" placeholder="Full Name">
</div>

<div class="input-group">
<input type="email" placeholder="Email">
</div>

<div class="input-group password-box">
<input type="password" id="password2" placeholder="Password">
<span class="eye" onclick="togglePassword2()">👁</span>
</div>

<button class="btn">Register</button>

</form>

<div class="footer">
Helpdesk Ticket Management System
</div>

</div>


<script>

function showLogin(){

document.getElementById("login").classList.add("active")
document.getElementById("register").classList.remove("active")

document.getElementById("loginTab").classList.add("active")
document.getElementById("registerTab").classList.remove("active")

}

function showRegister(){

document.getElementById("register").classList.add("active")
document.getElementById("login").classList.remove("active")

document.getElementById("registerTab").classList.add("active")
document.getElementById("loginTab").classList.remove("active")

}

/* PASSWORD TOGGLE */

function togglePassword(){

var x = document.getElementById("password");

if(x.type === "password"){
x.type = "text";
}
else{
x.type = "password";
}

}

function togglePassword2(){

var x = document.getElementById("password2");

if(x.type === "password"){
x.type = "text";
}
else{
x.type = "password";
}

}

/* BACK BUTTON */

function goHome(){
window.location.href="homepage.html";
}

</script>

</body>
</html>
